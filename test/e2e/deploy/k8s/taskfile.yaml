version: "3"

vars:
  NAMESPACE: '{{.NAMESPACE | default "wsgw-e2e" }}'
  HTTP2: '{{.HTTP2 | default "false"}}'

tasks:
  dynamodb:
    cmds:
      - kubectl -n {{.NAMESPACE}} apply -f ./dynamodb/dyamodb.yaml
      - kubectl -n {{.NAMESPACE}} wait --for=condition=available --timeout=120s deployment/dynamodb-local
      - |
        pkill -f "port-forward service/dynamodb-local" 2>/dev/null || true
        kubectl -n {{.NAMESPACE}} port-forward service/dynamodb-local 8000:8000 &
        PF_PID=$!
        trap "/bin/kill $PF_PID 2>/dev/null" EXIT
        until nc -z localhost 8000 2>/dev/null; do sleep 0.2; done
        AWS_ACCESS_KEY_ID=mockAccessKey AWS_SECRET_ACCESS_KEY=mockSecretKey \
          aws --endpoint-url=http://localhost:8000 --region eu-west-1 --no-cli-pager \
          dynamodb describe-table --table-name WsgwConnectionIds > /dev/null 2>&1 \
        || AWS_ACCESS_KEY_ID=mockAccessKey AWS_SECRET_ACCESS_KEY=mockSecretKey \
          aws --endpoint-url=http://localhost:8000 --region eu-west-1 --no-cli-pager \
          dynamodb create-table \
          --table-name WsgwConnectionIds \
          --attribute-definitions AttributeName=UserId,AttributeType=S AttributeName=ConnectionId,AttributeType=S \
          --key-schema AttributeName=UserId,KeyType=HASH AttributeName=ConnectionId,KeyType=RANGE \
          --provisioned-throughput ReadCapacityUnits=5,WriteCapacityUnits=5
  userdb:
    cmds:
      - |
        password_base=crixcrax
        nr_users=3
        mkdir -p $(dirname {{.DEV_LOG_FILE}})

        pwcreds="["
        for nummer in $(seq 1 1024); do
          if test $nummer -gt 1; then
            pwcreds="${pwcreds},"
          fi
          pwcreds="${pwcreds}{\"username\":\"user${nummer}\",\"password\":\"${password_base}${nummer}\"}"
        done
        pwcreds="${pwcreds}]"
        echo "pwcreds: $pwcreds"

        if ! kubectl -n {{.NAMESPACE}} get secrets wsgw-e2e-app-users > /dev/null;
        then
          kubectl -n {{.NAMESPACE}} create secret generic wsgw-e2e-app-users "--from-literal=PASSWORD_CREDENTIALS=$pwcreds"
        fi
  app:
    cmds:
      - task: userdb
      - kubectl -n {{.NAMESPACE}} apply -f ../../../../deploy/k8s/valkey-deployment.yaml
      - kubectl -n {{.NAMESPACE}} apply -f ../../../../deploy/k8s/valkey-service.yaml
      - kubectl -n {{.NAMESPACE}} wait --for=condition=available --timeout=120s deployment/valkey
      - kubectl -n {{.NAMESPACE}} create configmap wsgw-e2e-app-config
          --from-literal=HTTP2={{.HTTP2}}
          --dry-run=client -o yaml | kubectl -n {{.NAMESPACE}} apply -f -
      - |
        kubectl -n {{.NAMESPACE}} apply -f ./app/e2e-app.yaml

        echo "==== Rescaling wsgw-e2e-app, maybe...."
        app_scale="{{.E2EAPP_SCALE}}"
        if [ -z "$app_scale" ]; then
          echo "E2EAPP_SCALE not set; redploying wsgw-e2e-app with the current scale..."
          kubectl -n {{.NAMESPACE}} rollout restart deployment wsgw-e2e-app
        else
          echo "Rescaling wsgw-e2e-app to $app_scale"
          kubectl -n {{.NAMESPACE}} scale deployment wsgw-e2e-app --replicas 0
          kubectl -n {{.NAMESPACE}} scale deployment wsgw-e2e-app --replicas $app_scale
        fi
  client:
    cmds:
      - task: userdb
      - kubectl -n {{.NAMESPACE}} create configmap wsgw-e2e-client-config
          --from-literal=HTTP2={{.HTTP2}}
          --dry-run=client -o yaml | kubectl -n {{.NAMESPACE}} apply -f -
      - |
        kubectl -n {{.NAMESPACE}} apply -f ./client/e2e-client.yaml

        echo "==== Rescaling wsgw-e2e-client, maybe...."
        client_scale="{{.E2ECLIENT_SCALE}}"
        if [ -z "$client_scale" ]; then
          echo "E2ECLIENT_SCALE not set; redploying wsgw-e2e-client with the current scale..."
          kubectl -n {{.NAMESPACE}} rollout restart deployment wsgw-e2e-client
        else
          echo "Rescaling wsgw-e2e-client to $client_scale"
          kubectl -n {{.NAMESPACE}} scale deployment wsgw-e2e-client --replicas 0
          kubectl -n {{.NAMESPACE}} scale deployment wsgw-e2e-client --replicas $client_scale
        fi
